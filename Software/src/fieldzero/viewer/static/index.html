<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FieldZero — live viewer</title>
<link rel="stylesheet" href="/static/vendor/uPlot.min.css">
<style>
  :root {
    --bg: #12151a;  --panel: #1a1f27;  --edge: #2b333f;
    --fg: #e6eaf0;  --dim: #8c98a8;    --accent: #4da3ff;
    --warn: #ff6b6b; --ok: #4ade80;
    --grid: #232a34;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 13px/1.4 ui-sans-serif, system-ui, "Segoe UI", sans-serif;
    display: flex; flex-direction: column;
  }

  /* ---- top bar ---- */
  #topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 12px; background: var(--panel);
    border-bottom: 1px solid var(--edge); flex: 0 0 auto;
  }
  #topbar h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  #topbar .spacer { flex: 1; }
  #session-info { color: var(--dim); font-size: 12px; }
  #conn { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #33404f; }
  #conn.up { background: #14532d; color: var(--ok); }
  #conn.down { background: #4c1d1d; color: var(--warn); }

  button, select, input {
    background: #232b36; color: var(--fg);
    border: 1px solid var(--edge); border-radius: 4px;
    padding: 3px 7px; font: inherit; font-size: 12px;
  }
  button { cursor: pointer; }
  button:hover { background: #2e3846; border-color: var(--accent); }
  label { color: var(--dim); font-size: 12px; }

  /* ---- layout tree ---- */
  #layout { flex: 1 1 auto; display: flex; min-height: 0; padding: 6px; }
  .split { display: flex; flex: 1 1 0; min-width: 0; min-height: 0; gap: 0; }
  .split.row { flex-direction: row; }
  .split.col { flex-direction: column; }
  .divider { flex: 0 0 6px; background: transparent; position: relative; }
  .split.row > .divider { cursor: col-resize; }
  .split.col > .divider { cursor: row-resize; }
  .divider::after {
    content: ""; position: absolute; inset: 0; margin: auto;
    background: var(--edge); border-radius: 2px;
  }
  .split.row > .divider::after { width: 2px; height: 100%; }
  .split.col > .divider::after { height: 2px; width: 100%; }
  .divider:hover::after { background: var(--accent); }

  /* ---- pane ---- */
  .pane {
    flex: 1 1 0; min-width: 0; min-height: 0; margin: 3px;
    display: flex; flex-direction: column;
    background: var(--panel); border: 1px solid var(--edge); border-radius: 6px;
  }
  .pane-head {
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
    padding: 5px 7px; border-bottom: 1px solid var(--edge); flex: 0 0 auto;
  }
  .pane-head .ctl-spacer { flex: 1; }
  .pane-head .readout { color: var(--dim); font-variant-numeric: tabular-nums; font-size: 11px; }
  .chan-picker { position: relative; }
  .chan-menu {
    display: none; position: absolute; z-index: 20; top: 100%; left: 0; margin-top: 3px;
    background: #232b36; border: 1px solid var(--edge); border-radius: 5px;
    padding: 6px; min-width: 110px; box-shadow: 0 6px 20px rgba(0,0,0,.5);
  }
  .chan-menu.open { display: block; }
  .chan-menu label { display: flex; align-items: center; gap: 6px; padding: 2px 0; color: var(--fg); cursor: pointer; }
  .chan-menu .hint { color: var(--dim); font-size: 11px; padding-bottom: 4px; }
  .chan-quick { display: flex; gap: 6px; padding-bottom: 6px; margin-bottom: 4px; border-bottom: 1px solid var(--edge); }
  button.mini { padding: 1px 8px; font-size: 11px; color: var(--dim); }

  /* colour swatch shared by the channel picker and the on-plot legend */
  .leg-sw { width: 10px; height: 10px; border-radius: 2px; flex: 0 0 auto; display: inline-block; }

  /* on-plot legend — an overlay, so it never fights uPlot for layout height */
  .plot-legend {
    position: absolute; top: 6px; left: 70px; z-index: 5;
    display: flex; flex-wrap: wrap; gap: 4px 12px;
    pointer-events: none; max-width: calc(100% - 90px);
  }
  .plot-legend .leg-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--fg);
    background: rgba(18, 21, 26, .66); padding: 1px 6px; border-radius: 3px;
  }
  .plot { flex: 1 1 auto; min-height: 0; position: relative; overflow: hidden; }
  .plot .err {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--warn); font-size: 12px; text-align: center; padding: 10px;
  }
  .uplot { width: 100%; }

  /* ---- stats ---- */
  #stats-wrap {
    flex: 0 0 auto; border-top: 1px solid var(--edge); background: var(--panel);
    padding: 6px 10px 8px; overflow-x: auto;
  }
  #stats { border-collapse: collapse; font-variant-numeric: tabular-nums; font-size: 12px; }
  #stats th, #stats td { padding: 3px 12px 3px 0; text-align: right; white-space: nowrap; }
  #stats th { color: var(--dim); font-weight: 500; text-align: right; }
  #stats td:first-child, #stats th:first-child { text-align: left; }
  #stats tr.sat td { color: var(--warn); }
  #stats .flag { font-weight: 600; }
  #warn-bar { color: var(--warn); font-size: 12px; padding: 4px 0 0; }

  /* railed banner — full-width, unmissable; collapses to nothing when healthy */
  #rail-banner {
    display: none; flex: 0 0 auto;
    background: var(--warn); color: #1a0000;
    font-weight: 600; font-size: 13px; text-align: center;
    padding: 6px 12px;
  }
  #rail-banner.show { display: block; }
</style>
</head>
<body>

<div id="topbar">
  <h1>FieldZero</h1>
  <span id="session-info">connecting…</span>
  <span class="spacer"></span>
  <label>stats units
    <select id="stats-units"><option value="pT">pT</option><option value="V">V</option></select>
  </label>
  <button id="save-layout">Save layout</button>
  <button id="load-layout">Load layout</button>
  <button id="reset-layout">Reset</button>
  <span id="conn">…</span>
</div>

<div id="rail-banner"></div>

<div id="layout"></div>

<div id="stats-wrap">
  <table id="stats"></table>
  <div id="warn-bar"></div>
</div>

<input type="file" id="file-input" accept="application/json" style="display:none">

<script src="/static/vendor/uPlot.iife.min.js"></script>
<script src="/static/renderers.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
